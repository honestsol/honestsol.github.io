<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title></title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<main>

  <!-- 카테고리 메뉴 -->
  <div class="categories">
    <a href="/">all</a>
    <a href="?cat=journal">journal</a>
    <a href="?cat=music">music</a>
    <a href="?cat=tattoo">tattoo</a>
  </div>

  <ul id="post-list">
    {% for post in site.posts %}
      <li data-cat="{% for cat in post.categories %}{{ cat }} {% endfor %}">
        <span class="date">
          {{ post.date | date: "%Y.%m.%d" }}
        </span>

        <a href="{{ post.url }}">
          {{ post.title }}
        </a>
      </li>
    {% endfor %}
  </ul>

</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const cat = params.get("cat");

  if (cat) {
    document.querySelectorAll("#post-list li").forEach(li => {
      if (!li.dataset.cat.includes(cat)) {
        li.style.display = "none";
      }
    });
  }
</script>

</body>
</html>
